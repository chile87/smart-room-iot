<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Smart Room IoT TinkerCAD Wiring Diagram (2 Breadboards)</title>
  <desc id="desc">Professional wiring map for Arduino Uno R3 with two breadboards, sensors, communication modules, actuators, and LCD I2C display.</desc>

  <defs>
    <style>
      .label { font: 14px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .title { font: 24px 'Segoe UI Semibold', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .pin { font: 11px 'Consolas', monospace; fill: #111827; }
      .wire { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .pwr { stroke: #dc2626; }
      .gnd { stroke: #111827; }
      .data { stroke: #eab308; }
      .trig { stroke: #f97316; }
      .analog { stroke: #22c55e; }
      .serial { stroke: #2563eb; }
      .buzz { stroke: #9333ea; }
      .junction { fill: #1f2937; }
      .board { fill: #f9fafb; stroke: #9ca3af; stroke-width: 2; }
      .chip { fill: #e5e7eb; stroke: #6b7280; stroke-width: 2; }
      .module { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .actuator { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
      .sensor { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="1100" fill="#ffffff"/>
  <text x="900" y="42" text-anchor="middle" class="title">Smart Room IoT - TinkerCAD Wiring Diagram</text>
  <text x="900" y="68" text-anchor="middle" class="subtitle">Arduino Uno R3 + 2 Breadboards (Sensors/Communication &amp; Actuators/Display)</text>

  <!-- Arduino Uno R3 -->
  <g id="arduino-uno" filter="url(#shadow)">
    <rect x="650" y="100" width="500" height="230" rx="18" class="module"/>
    <text x="900" y="132" text-anchor="middle" class="label">Arduino Uno R3</text>

    <!-- Digital pins -->
    <g id="arduino-digital-pins">
      <text x="700" y="160" class="small">Digital Pins</text>
      <g>
        <circle cx="700" cy="182" r="5" fill="#111827"/><text x="712" y="186" class="pin">D2</text>
        <circle cx="700" cy="202" r="5" fill="#111827"/><text x="712" y="206" class="pin">D3</text>
        <circle cx="700" cy="222" r="5" fill="#111827"/><text x="712" y="226" class="pin">D4</text>
        <circle cx="700" cy="242" r="5" fill="#111827"/><text x="712" y="246" class="pin">D5</text>
        <circle cx="700" cy="262" r="5" fill="#111827"/><text x="712" y="266" class="pin">D6</text>
        <circle cx="1100" cy="182" r="5" fill="#111827"/><text x="1112" y="186" class="pin">D9</text>
        <circle cx="1100" cy="202" r="5" fill="#111827"/><text x="1112" y="206" class="pin">D10</text>
        <circle cx="1100" cy="222" r="5" fill="#111827"/><text x="1112" y="226" class="pin">D11</text>
      </g>
    </g>

    <!-- Analog and I2C -->
    <g id="arduino-analog-pins">
      <text x="880" y="160" class="small">Analog / I2C</text>
      <circle cx="900" cy="290" r="5" fill="#111827"/><text x="912" y="294" class="pin">A0</text>
      <circle cx="980" cy="290" r="5" fill="#111827"/><text x="992" y="294" class="pin">A4 (SDA)</text>
      <circle cx="1065" cy="290" r="5" fill="#111827"/><text x="1077" y="294" class="pin">A5 (SCL)</text>
    </g>

    <!-- Power pins -->
    <g id="arduino-power-pins">
      <text x="760" y="312" class="small">Power</text>
      <circle cx="780" cy="290" r="5" fill="#dc2626"/><text x="792" y="294" class="pin">5V</text>
      <circle cx="840" cy="290" r="5" fill="#111827"/><text x="852" y="294" class="pin">GND</text>
    </g>
  </g>

  <!-- Breadboard 1 -->
  <g id="breadboard-1" filter="url(#shadow)">
    <rect x="120" y="400" width="720" height="600" rx="10" class="board"/>
    <text x="480" y="428" text-anchor="middle" class="label">Breadboard 1 - Sensors &amp; Communication</text>

    <!-- power rails both sides -->
    <rect x="145" y="440" width="24" height="520" fill="#fecaca" stroke="#dc2626"/>
    <rect x="175" y="440" width="24" height="520" fill="#e5e7eb" stroke="#111827"/>
    <rect x="761" y="440" width="24" height="520" fill="#fecaca" stroke="#dc2626"/>
    <rect x="791" y="440" width="24" height="520" fill="#e5e7eb" stroke="#111827"/>
    <text x="157" y="434" text-anchor="middle" class="pin">+</text><text x="187" y="434" text-anchor="middle" class="pin">-</text>
    <text x="773" y="434" text-anchor="middle" class="pin">+</text><text x="803" y="434" text-anchor="middle" class="pin">-</text>

    <g id="dht22" class="sensor">
      <rect x="240" y="490" width="120" height="90" rx="8" class="chip"/>
      <text x="300" y="518" text-anchor="middle" class="small">DHT22</text>
      <text x="255" y="550" class="pin">VCC DATA NC GND</text>
    </g>

    <g id="hcsr04" class="sensor">
      <rect x="410" y="500" width="180" height="100" rx="8" class="chip"/>
      <circle cx="465" cy="548" r="18" fill="#9ca3af"/>
      <circle cx="535" cy="548" r="18" fill="#9ca3af"/>
      <text x="500" y="520" text-anchor="middle" class="small">HC-SR04</text>
      <text x="430" y="587" class="pin">VCC Trig Echo GND</text>
    </g>

    <g id="ldr-divider">
      <circle cx="310" cy="705" r="26" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text x="310" y="709" text-anchor="middle" class="pin">LDR</text>
      <path d="M365 675 L378 683 L365 691 L378 699 L365 707 L378 715 L365 723" stroke="#7c3aed" stroke-width="2" fill="none"/>
      <text x="390" y="705" class="pin">10kΩ</text>
      <text x="250" y="748" class="small">Voltage divider node → A0</text>
    </g>

    <g id="bluetooth" class="module">
      <rect x="510" y="700" width="190" height="90" rx="8" class="module"/>
      <text x="605" y="728" text-anchor="middle" class="small">Bluetooth HC-05</text>
      <text x="525" y="760" class="pin">VCC GND TXD RXD</text>
    </g>
  </g>

  <!-- Breadboard 2 -->
  <g id="breadboard-2" filter="url(#shadow)">
    <rect x="960" y="400" width="720" height="600" rx="10" class="board"/>
    <text x="1320" y="428" text-anchor="middle" class="label">Breadboard 2 - Actuators &amp; Display</text>

    <rect x="985" y="440" width="24" height="520" fill="#fecaca" stroke="#dc2626"/>
    <rect x="1015" y="440" width="24" height="520" fill="#e5e7eb" stroke="#111827"/>
    <rect x="1601" y="440" width="24" height="520" fill="#fecaca" stroke="#dc2626"/>
    <rect x="1631" y="440" width="24" height="520" fill="#e5e7eb" stroke="#111827"/>
    <text x="997" y="434" text-anchor="middle" class="pin">+</text><text x="1027" y="434" text-anchor="middle" class="pin">-</text>
    <text x="1613" y="434" text-anchor="middle" class="pin">+</text><text x="1643" y="434" text-anchor="middle" class="pin">-</text>

    <g id="servo" class="actuator">
      <rect x="1080" y="500" width="160" height="95" rx="8" class="actuator"/>
      <circle cx="1160" cy="548" r="14" fill="#fca5a5" stroke="#991b1b"/>
      <text x="1160" y="525" text-anchor="middle" class="small">Servo SG90</text>
      <text x="1094" y="585" class="pin">Red Brown Yellow</text>
    </g>

    <g id="led-resistor">
      <path d="M1265 520 L1277 528 L1265 536 L1277 544 L1265 552 L1277 560" stroke="#6b7280" stroke-width="2" fill="none"/>
      <text x="1286" y="545" class="pin">220Ω</text>
      <polygon points="1335,525 1360,545 1335,565" fill="#fde047" stroke="#a16207" stroke-width="2"/>
      <line x1="1365" y1="525" x2="1365" y2="565" stroke="#111827" stroke-width="2"/>
      <text x="1315" y="590" class="small">LED + resistor</text>
    </g>

    <g id="buzzer" class="actuator">
      <circle cx="1170" cy="705" r="34" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
      <text x="1170" y="710" text-anchor="middle" class="small">Buzzer</text>
      <text x="1144" y="745" class="pin">+    -</text>
    </g>

    <g id="lcd" class="module">
      <rect x="1360" y="690" width="250" height="140" rx="10" class="module"/>
      <rect x="1392" y="725" width="185" height="65" fill="#bbf7d0" stroke="#15803d"/>
      <text x="1485" y="715" text-anchor="middle" class="small">LCD1602 I2C</text>
      <text x="1380" y="812" class="pin">VCC GND SDA SCL</text>
    </g>
  </g>

  <!-- Wiring paths -->
  <g id="wires">
    <!-- Power rails -->
    <path class="wire pwr" d="M780 290 C620 320, 300 330, 157 440"/>
    <path class="wire pwr" d="M780 290 C900 340, 980 330, 997 440"/>
    <path class="wire gnd" d="M840 290 C660 340, 360 340, 187 440"/>
    <path class="wire gnd" d="M840 290 C930 330, 1015 330, 1027 440"/>

    <!-- Breadboard 1 sensors -->
    <path class="wire pwr" d="M157 520 C190 520, 220 515, 240 515"/>
    <path class="wire data" d="M300 545 C430 500, 610 300, 700 182"/>
    <path class="wire gnd" d="M360 545 C290 565, 210 560, 187 560"/>

    <path class="wire pwr" d="M157 565 C260 565, 350 560, 410 560"/>
    <path class="wire trig" d="M470 595 C560 530, 640 330, 700 202"/>
    <path class="wire data" d="M520 595 C620 540, 690 360, 700 222"/>
    <path class="wire gnd" d="M590 595 C430 650, 240 640, 187 640"/>

    <path class="wire pwr" d="M157 705 C225 705, 250 700, 284 700"/>
    <path class="wire analog" d="M336 705 C520 690, 760 500, 900 290"/>
    <path class="wire gnd" d="M378 723 C320 760, 260 780, 187 780"/>

    <path class="wire pwr" d="M157 735 C290 735, 430 720, 510 720"/>
    <path class="wire gnd" d="M700 740 C500 820, 260 840, 187 840"/>
    <path class="wire serial" d="M640 760 C820 660, 980 360, 1100 202"/>
    <path class="wire analog" d="M685 770 C860 700, 1030 400, 1100 222"/>

    <!-- Breadboard 2 actuators -->
    <path class="wire pwr" d="M997 535 C1040 535, 1070 530, 1080 530"/>
    <path class="wire gnd" d="M1027 560 C1060 560, 1070 560, 1080 560"/>
    <path class="wire data" d="M1240 560 C1120 520, 1090 330, 1100 182"/>

    <path class="wire analog" d="M1265 540 C1160 530, 940 360, 700 242"/>
    <path class="wire gnd" d="M1365 560 C1280 620, 1130 640, 1027 650"/>

    <path class="wire buzz" d="M1136 705 C980 670, 760 420, 700 262"/>
    <path class="wire gnd" d="M1204 705 C1140 730, 1080 735, 1027 735"/>

    <path class="wire pwr" d="M997 800 C1140 800, 1240 800, 1360 800"/>
    <path class="wire gnd" d="M1027 815 C1140 815, 1240 815, 1408 815"/>
    <path class="wire serial" d="M1450 815 C1300 760, 1100 520, 980 290"/>
    <path class="wire data" d="M1510 815 C1390 760, 1230 530, 1065 290"/>
  </g>

  <!-- Junction dots -->
  <g id="junctions">
    <circle class="junction" cx="157" cy="520" r="4"/><circle class="junction" cx="187" cy="560" r="4"/>
    <circle class="junction" cx="157" cy="565" r="4"/><circle class="junction" cx="187" cy="640" r="4"/>
    <circle class="junction" cx="336" cy="705" r="4"/><circle class="junction" cx="640" cy="760" r="4"/>
    <circle class="junction" cx="997" cy="535" r="4"/><circle class="junction" cx="1027" cy="560" r="4"/>
    <circle class="junction" cx="1265" cy="540" r="4"/><circle class="junction" cx="1136" cy="705" r="4"/>
    <circle class="junction" cx="1450" cy="815" r="4"/><circle class="junction" cx="1510" cy="815" r="4"/>
  </g>

  <!-- Legend -->
  <g id="legend" filter="url(#shadow)">
    <rect x="1380" y="80" width="370" height="265" rx="12" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="1565" y="110" text-anchor="middle" class="label">Wire Color Legend</text>
    <line x1="1410" y1="140" x2="1460" y2="140" class="wire pwr"/><text x="1470" y="145" class="small">Red: 5V / VCC</text>
    <line x1="1410" y1="170" x2="1460" y2="170" class="wire gnd"/><text x="1470" y="175" class="small">Black: GND</text>
    <line x1="1410" y1="200" x2="1460" y2="200" class="wire data"/><text x="1470" y="205" class="small">Yellow: Data signals (DHT22, Echo, Servo, SCL)</text>
    <line x1="1410" y1="230" x2="1460" y2="230" class="wire trig"/><text x="1470" y="235" class="small">Orange: HC-SR04 Trigger</text>
    <line x1="1410" y1="260" x2="1460" y2="260" class="wire analog"/><text x="1470" y="265" class="small">Green: Analog / LED / Bluetooth RX</text>
    <line x1="1410" y1="290" x2="1460" y2="290" class="wire serial"/><text x="1470" y="295" class="small">Blue: I2C SDA / Bluetooth TX</text>
    <line x1="1410" y1="320" x2="1460" y2="320" class="wire buzz"/><text x="1470" y="325" class="small">Purple: Buzzer signal</text>
  </g>

  <!-- Connection map annotations -->
  <g id="annotations">
    <text x="90" y="1030" class="small">Pins used: 5V, GND, D2, D3, D4, D5, D6, D9, D10, D11, A0, A4, A5</text>
    <text x="90" y="1050" class="small">All rail power is distributed from Arduino 5V/GND with common ground across both breadboards.</text>
  </g>
</svg>
